<style>
.pricing-grid{ display:grid; grid-template-columns:repeat(5, 1fr); gap:20px; margin-top:32px; }
@media (max-width:1200px){ .pricing-grid{ grid-template-columns:repeat(3, 1fr); } }
@media (max-width:760px){ .pricing-grid{ grid-template-columns:repeat(2, 1fr); } }
@media (max-width:480px){ .pricing-grid{ grid-template-columns:1fr; } }
.plan-card{ background:var(--white); border:1px solid var(--line); border-radius:14px; padding:28px; display:flex; flex-direction:column; }
.plan-card.highlight{ border-color:var(--clay); box-shadow:0 8px 24px rgba(201,113,75,.12); }
.plan-name{ font-family:'Fraunces',serif; font-size:1.2rem; margin-bottom:6px; }
.plan-price{ font-size:2rem; font-weight:600; margin-bottom:4px; }
.plan-price span{ font-size:1rem; color:var(--ink-soft); font-weight:400; }
.plan-period-badge{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; color:var(--clay); background:var(--clay-soft); border-radius:999px; padding:3px 10px; margin-bottom:12px; }
.plan-desc{ color:var(--ink-soft); font-size:.9rem; margin-bottom:20px; flex-grow:1; }
.plan-features{ list-style:none; padding:0; margin:0 0 24px; font-size:.88rem; color:var(--ink); }
.plan-features li{ padding:6px 0; border-bottom:1px solid var(--line); display:flex; gap:8px; align-items:flex-start; }
.plan-features li:last-child{ border-bottom:none; }
.plan-features li .check{ color:var(--sage); font-weight:700; flex-shrink:0; }
.plan-features li .cross{ color:var(--ink-soft); flex-shrink:0; }
</style>
