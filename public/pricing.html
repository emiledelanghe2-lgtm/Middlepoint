<script src="/pricing-config.js"></script>
<script>
const grid = document.getElementById('pricingGrid');
PRICING_CONFIG.plans.forEach(plan => {
  const card = document.createElement('div');
  card.className = 'plan-card' + (plan.highlight ? ' highlight' : '');

  const priceLabel = plan.price === null
    ? 'Op maat'
    : plan.price === 0
      ? 'Gratis'
      : `${PRICING_CONFIG.currency}${plan.price.toFixed(2).replace('.', ',')}`;

  const sessionLabel = plan.sessionsPerMonth === null
    ? 'Onbeperkt gesprekken'
    : plan.sessionsPerMonth === 1
      ? '1 gesprek'
      : `${plan.sessionsPerMonth} gesprekken per maand`;

  card.innerHTML = `
    <div class="plan-name">${plan.name}</div>
    <div class="plan-price">${priceLabel} ${plan.period ? `<span>${plan.period}</span>` : ''}</div>
    ${plan.period === 'eenmalig' ? '<div class="plan-period-badge">Eenmalig</div>' : plan.period === '/maand' ? '<div class="plan-period-badge">Per maand</div>' : '<div style="height:24px"></div>'}
    <div class="plan-desc">${plan.description}</div>
    <ul class="plan-features">
      <li><span class="check">✓</span> ${sessionLabel}</li>
      <li>${plan.includesFollowups ? '<span class="check">✓</span>' : '<span class="cross">–</span>'} Vervolgvragen</li>
      <li>${plan.includesCheckins ? '<span class="check">✓</span>' : '<span class="cross">–</span>'} Groeidocument / check-ins</li>
      <li>${plan.id === 'gratis' ? '<span class="cross">–</span>' : '<span class="check">✓</span>'} Volledig document met inzichten en tips</li>
      ${plan.includesProfessionalInsights ? '<li><span class="check">✓</span> Inzichten voor begeleider</li>' : ''}
      ${plan.maxCharsPerStory ? `<li><span class="check">✓</span> Max ${plan.maxCharsPerStory.toLocaleString('nl-BE')} tekens per verhaal</li>` : ''}
    </ul>
    <a href="${plan.ctaLink}" class="btn ${plan.highlight ? 'clay' : 'outline'}" style="text-align:center">${plan.cta}</a>
  `;
  grid.appendChild(card);
});
</script>
