<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jullie document, Middlepoint</title>
<link rel="stylesheet" href="/style.css">
<style>
@media print {
  .nav-bar, .no-print { display: none !important; }
  body { background: white; }
  .app-wrap { max-width: 100%; padding: 20px; }
  .doc-section { break-inside: avoid; }
}
.doc-quote{ border-left:3px solid var(--clay); padding-left:18px; margin:32px 0; font-family:'Fraunces',serif; font-style:italic; font-size:1.05rem; color:var(--ink); }
.warning-banner{ background:var(--clay-soft); border:1px solid var(--clay); border-radius:var(--radius); padding:14px 18px; margin-bottom:20px; font-size:.88rem; }
.info-banner{ background:#EFF4ED; border:1px solid var(--sage); border-radius:var(--radius); padding:14px 18px; margin-bottom:20px; font-size:.88rem; }
</style>
</head>
<body>
<header class="nav-bar">
<nav class="nav">
  <a href="/" class="brand">middle<span>point</span></a>
</nav>
</header>

<div class="app-wrap" id="app" style="max-width:760px">
  <div class="status-box">Even laden...</div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');
const returnToken = new URLSearchParams(window.location.search).get('from');
const backLink = returnToken ? `/mijn-gesprekken.html?token=${returnToken}` : '/';
const backLabel = returnToken ? 'Terug naar Mijn gesprekken' : 'Terug naar startpagina';
const app = document.getElementById('app');

async function goToMijnGesprekken() {
  if (returnToken) {
    window.location.href = `/mijn-gesprekken.html?token=${encodeURIComponent(returnToken)}`;
    return;
  }
  try {
    const res = await fetch(`/.netlify/functions/get-my-sessions-link?token=${token}`);
    const data = await res.json();
    if (res.ok && data.link) {
      window.location.href = data.link;
    } else {
      window.location.href = '/login.html';
    }
  } catch (e) {
    window.location.href = '/login.html';
  }
}

const QUOTES = {
  koppel: {
    main: 'Een relatie groeit niet door nooit te botsen, maar door elkaar te blijven kiezen na elke botsing.',
    followup: 'Vooruitgang zit niet in perfectie, maar in het samen blijven proberen.',
  },
  familie: {
    main: 'Familie kies je niet, begrip wel.',
    followup: 'Oude patronen doorbreken begint met één klein, nieuw gesprek.',
  },
  vrienden: {
    main: 'Een goede vriendschap overleeft geen stilte, wel eerlijkheid.',
    followup: 'Wat je samen hersteld hebt, is vaak sterker dan wat nooit gebroken was.',
  },
  buren: {
    main: 'Goede buren maken geen ruzie, ze maken afspraken.',
    followup: 'Een klein gebaar van begrip weegt vaak zwaarder dan een groot gelijk.',
  },
  werk: {
    main: 'Samenwerken begint met elkaar willen begrijpen, niet met gelijk willen krijgen.',
    followup: 'Verandering op de werkvloer groeit stap voor stap, niet in één gesprek.',
  },
  school: {
    main: 'Wie goed luistert, leert het meest.',
    followup: 'Elke kleine stap vooruit telt, ook als het probleem nog niet helemaal opgelost is.',
  },
  andere: {
    main: 'Begrip is het begin van elke oplossing.',
    followup: 'Vooruitgang, hoe klein ook, is de moeite waard om te vieren.',
  },
};

function getQuote(category, isFollowup) {
  const set = QUOTES[category] || QUOTES.andere;
  return isFollowup ? set.followup : set.main;
}

async function load() {
  const res = await fetch(`/.netlify/functions/get-document?token=${token}`);
  const data = await res.json();
  if (!res.ok) { app.innerHTML = `<div class="error-box">${data.error}</div>`; return; }

  if (!data.documents.length) {
    app.innerHTML = `<div class="status-box">Het document wordt nog opgesteld. Deze pagina herlaadt zelf.</div>`;
    setTimeout(load, 8000);
    return;
  }

  renderDoc(data);
}

function downloadPDF() { window.print(); }

function shareViaWhatsApp() {
  const link = window.location.href;
  const text = `Hoi, ons document van Middlepoint staat klaar. Het is een eerlijk, neutraal overzicht van ons gesprek, met tips en afspraken om samen mee verder te gaan.\n\nJe vindt het hier: ${link}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function shareMiddlepointReferral() {
  const text = `Ik gebruikte Middlepoint om samen met iemand een moeilijk gesprek helderder te krijgen. Misschien nuttig voor jou ook: https://middlepoint.net`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function shareViaEmail() {
  const link = window.location.href;
  const subject = encodeURIComponent('Jullie Middlepoint document staat klaar');
  const body = encodeURIComponent(`Hoi,\n\nOns document van Middlepoint staat klaar. Het is een eerlijk, neutraal overzicht van ons gesprek, met tips en afspraken om samen mee verder te gaan.\n\nJe vindt het hier: ${link}`);
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function docTitleFor(version) {
  return version === 1 ? 'Origineel document' : 'Opvolgdocument';
}

function renderDoc(data, displayVersion) {
  const allVersions = data.documents;
  const doc = displayVersion ? allVersions.find(d => d.version === displayVersion) : allVersions[0];
  const isPaid = data.isPaid || false;
  const myName = data.myName;
  const isThirdPartyViewer = !!data.isThirdPartyViewer;
  const category = data.category || 'andere';
  const isFollowupDoc = doc.version >= 2;
  const followupAlreadyUsed = allVersions.some(d => d.version >= 2);
  const missingEmailNames = data.missingEmailNames || [];

  const perspectiveEntries = Object.entries(doc.perspectives || {});
  const questionEntries = Object.entries(doc.questions_to_ask || {});
  const myTipEntries = isThirdPartyViewer ? Object.entries(doc.tips || {}) : Object.entries(doc.tips || {}).filter(([name]) => name === myName);
  const myPhraseEntries = isThirdPartyViewer ? Object.entries(doc.suggested_phrases || {}) : Object.entries(doc.suggested_phrases || {}).filter(([name]) => name === myName);
  const sharedActions = doc.shared_actions || [];

  const versionPicker = allVersions.length > 1 ? `
    <div class="field" style="max-width:320px">
      <label>Bekijk</label>
      <select id="versionSelect">
        ${allVersions.map(d => `<option value="${d.version}" ${d.version === doc.version ? 'selected' : ''}>${docTitleFor(d.version)}</option>`).join('')}
      </select>
    </div>` : '';

  const missingEmailBanner = (!isThirdPartyViewer && missingEmailNames.length) ? `
    <div class="warning-banner no-print">
      <strong>Let op:</strong> we hebben geen e-mailadres van ${missingEmailNames.join(' en ')}. Bezorg deze persoon de link naar dit gesprek zelf, want die kan anders niet automatisch verwittigd worden.
    </div>` : '';

  const readyReminderBanner = `
    <div class="info-banner no-print">
      Je vindt dit document altijd terug via <a href="/login.html" style="font-weight:600">Mijn gesprekken</a>, ook later nog.
    </div>`;

  const mainSectionsHTML = isFollowupDoc ? `
    <div class="doc-section">
      <span class="label">Terugblik</span>
      <h3>Korte samenvatting</h3>
      <p>${doc.shared_summary}</p>
    </div>

    <div class="doc-section">
      <span class="label">Voortgang</span>
      <h3>Wat er beter gaat</h3>
      <p>${doc.common_ground}</p>
    </div>` : `
    <div class="doc-section">
      <span class="label">Objectief overzicht</span>
      <h3>Wat er speelt</h3>
      <p>${doc.shared_summary}</p>
    </div>

    <div class="doc-section">
      <span class="label">Gedeelde grond</span>
      <h3>Waar jullie het al over eens zijn</h3>
      <p>${doc.common_ground}</p>
    </div>`;

  app.innerHTML = `
    <a href="${backLink}" class="btn ghost no-print" style="margin-bottom:16px;display:inline-block">← ${backLabel}</a>
    <span class="label">${docTitleFor(doc.version)}${isThirdPartyViewer ? ' — volledig overzicht' : ''}</span>
    <h1>Jullie document</h1>

    ${missingEmailBanner}

    <div class="no-print" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px">
      <button onclick="downloadPDF()" class="btn outline" style="padding:9px 16px;font-size:.85rem">⬇ Download als PDF</button>
      <button onclick="shareViaEmail()" class="btn outline" style="padding:9px 16px;font-size:.85rem">✉ Verstuur via mail</button>
      <button onclick="shareViaWhatsApp()" class="btn whatsapp" style="padding:9px 16px;font-size:.85rem">Verstuur via WhatsApp</button>
    </div>

    ${versionPicker}

    ${mainSectionsHTML}

    ${isPaid ? `
    ${!isFollowupDoc ? `
    <div class="doc-section">
      <span class="label">Perspectief</span>
      <h3>Hoe de ander het ziet</h3>
      ${perspectiveEntries.map(([name, p]) => `
        <div class="person-block">
          <div class="who">Voor ${name}: hoe de ander dit ziet</div>
          <p><strong>Wat er waarschijnlijk speelt bij de ander:</strong> ${p.explanation}</p>
          <p><strong>Wat de ander goed doet:</strong> ${p.strengths}</p>
          <p><strong>Waar groei mogelijk is voor de ander:</strong> ${p.growth_areas}</p>
        </div>`).join('')}
    </div>` : ''}

    ${sharedActions.length ? `
    <div class="doc-section">
      <span class="label">Samen aan de slag</span>
      <h3>${isFollowupDoc ? 'Vernieuwde afspraken' : 'Concrete afspraken om samen te proberen'}</h3>
      <ul class="tip-list">${sharedActions.map(a => `<li>${a}</li>`).join('')}</ul>
    </div>` : ''}

    ${!isFollowupDoc ? `
    <div class="doc-section">
      <span class="label">Gesprek openen</span>
      <h3>Vragen om aan elkaar te stellen</h3>
      ${questionEntries.map(([name, qs]) => `
        <div class="person-block">
          <div class="who">${name} kan vragen</div>
          <ul class="tip-list">${qs.map(q => `<li>${q}</li>`).join('')}</ul>
        </div>`).join('')}
    </div>` : ''}

    <div class="doc-section">
      <span class="label">${isThirdPartyViewer ? 'Persoonlijke onderdelen' : 'Alleen voor jou'}</span>
      <h3>${isThirdPartyViewer ? 'Persoonlijke tips en zinnen van beide deelnemers' : (isFollowupDoc ? 'Vernieuwde tips voor jezelf' : 'Jouw persoonlijke onderdeel')}</h3>
      <p style="color:var(--ink-soft);font-size:.85rem;margin-bottom:16px">${isThirdPartyViewer ? 'Als organisator zie jij dit volledige overzicht. De deelnemers zelf zien elk enkel hun eigen onderdeel.' : 'Dit hele onderdeel is enkel zichtbaar voor jou, niet voor de andere deelnemer.'}</p>
      ${myTipEntries.map(([name, tips]) => `
      <div class="person-block">
        <div class="who">Tips${isThirdPartyViewer ? ` voor ${name}` : ' voor jezelf'}</div>
        <ul class="tip-list">${tips.map(t => `<li>${t}</li>`).join('')}</ul>
      </div>`).join('')}
      ${myPhraseEntries.map(([name, phrases]) => `
      <div class="person-block">
        <div class="who">Wat ${isThirdPartyViewer ? name : 'je'} zou kunnen zeggen</div>
        <ul class="tip-list">${phrases.map(p => `<li>"${p}"</li>`).join('')}</ul>
      </div>`).join('')}
    </div>

    <div class="doc-quote no-print">"${getQuote(category, isFollowupDoc)}"</div>
    ` : `
    <div class="doc-section no-print" style="background:var(--clay-soft);border-radius:var(--radius);padding:28px;border-bottom:none">
      <span class="label">Er is meer</span>
      <h3>Dit is jullie eerste inzicht</h3>
      <p style="color:var(--ink-soft);max-width:480px;margin:0 0 12px">Het volledige document bevat ook:</p>
      <ul style="color:var(--ink-soft);margin:0 0 18px;padding-left:20px">
        <li>Hoe de ander het werkelijk ziet, uitgelegd in jouw taal</li>
        <li>Persoonlijke tips, enkel zichtbaar voor jou</li>
        <li>Concrete vragen om het gesprek te openen</li>
        <li>Concrete, gedeelde afspraken om samen te proberen</li>
        <li>Zinnen die je letterlijk kan gebruiken, enkel zichtbaar voor jou</li>
        <li>Eén opvolgdocument om later op terug te komen</li>
      </ul>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="/pricing.html" class="btn clay">Bekijk de volledige mogelijkheden</a>
        <a href="/voorbeeld-document.html" class="btn outline">Bekijk een voorbeeld</a>
      </div>
    </div>`}

    ${readyReminderBanner}

    <div class="doc-section no-print" style="text-align:center;border-bottom:none">
      ${isPaid ? (followupAlreadyUsed ? `
      <span class="label">Groeidocument</span>
      <h3>Dit gesprek is afgerond</h3>
      <p style="color:var(--ink-soft);max-width:480px;margin:0 auto 18px">Jullie hebben de opvolging voor dit gesprek al gebruikt. Elk gesprek geeft recht op één opvolgdocument. Wil je nog iets anders bespreken? Start gerust een nieuw gesprek.</p>
      <a href="/new.html" class="btn clay">Start een nieuw gesprek</a>
      ` : `
      <span class="label">Groeidocument</span>
      <h3>Kom later terug</h3>
      <p style="color:var(--ink-soft);max-width:480px;margin:0 auto 18px">Reageer op de tips en afspraken uit jullie document, laat weten wat al beter gaat, en vul aan wat nog speelt. Dit gesprek geeft recht op één opvolgdocument. Dat kan op elk moment dat het jou past via <a href="/login.html">Mijn gesprekken</a>.</p>
      <button id="startRoundBtn" class="btn clay">Start een opvolging</button>
      <div id="roundMsg" style="margin-top:12px;font-size:.9rem"></div>
      `) : ''}
   <div class="card no-print" style="background:#EFF4ED;border:none;margin-top:24px;padding:18px;text-align:center">
        <p style="margin:0 0 12px;font-size:.9rem">Vond je dit waardevol? Ken je iemand anders die hier iets aan zou kunnen hebben?</p>
        <button type="button" class="btn whatsapp" style="padding:9px 16px;font-size:.85rem" onclick="shareMiddlepointReferral()">Deel Middlepoint via WhatsApp</button>
      </div>
      <div style="margin-top:24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <a href="/" class="btn outline">Terug naar startpagina</a>
        <button type="button" class="btn clay" onclick="goToMijnGesprekken()">Naar Mijn gesprekken</button>
      </div>
    </div>
  `;

  if (allVersions.length > 1) {
    document.getElementById('versionSelect').addEventListener('change', (e) => {
      renderDoc(data, parseInt(e.target.value, 10));
    });
  }

  if (isPaid && !followupAlreadyUsed) {
    document.getElementById('startRoundBtn').addEventListener('click', async () => {
      const btn = document.getElementById('startRoundBtn');
      const msg = document.getElementById('roundMsg');
      btn.disabled = true;
      btn.textContent = 'Even geduld...';
      msg.style.color = '';
      msg.textContent = '';
      try {
        const res = await fetch('/.netlify/functions/start-new-round', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token }),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        window.location.href = `/story.html?token=${token}${returnToken ? '&from=' + encodeURIComponent(returnToken) : ''}`;
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Start een opvolging';
        msg.style.color = '#8A4222';
        msg.textContent = err.message;
      }
    });
  }
}

load();
</script>
</body>
</html>
