.selfhelp-quote{ border-left:3px solid var(--clay); padding-left:18px; margin:24px 0; font-family:'Fraunces',serif; font-style:italic; font-size:1.05rem; color:var(--ink); }
.premium-badge{ display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--clay); background:var(--clay-soft); border-radius:999px; padding:3px 10px; margin-bottom:8px; }

<script>
  (function() {
    const toggle = document.getElementById('navToggle');
    const links = document.getElementById('navLinks');
    toggle.addEventListener('click', () => {
      const isOpen = links.classList.toggle('open');
      toggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      toggle.textContent = isOpen ? '✕' : '☰';
    });
    links.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        links.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
        toggle.textContent = '☰';
      });
    });
  })();
</script>

<div class="app-wrap" id="app">
  <div class="skeleton skeleton-line short"></div>
  <div class="skeleton skeleton-line" style="height:32px;width:70%;margin-bottom:20px"></div>

<script>
const SELF_HELP_STRIPE_LINK = 'https://buy.stripe.com/9B65kD2wA2zq4o11B9aVa0j';

const existingToken = new URLSearchParams(window.location.search).get('token');
const selfhelpReturn = new URLSearchParams(window.location.search).get('selfhelp') === 'true';
const app = document.getElementById('app');

function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function downloadReflectionPDF() { window.print(); }
function shareReflectionWhatsApp() {
  const link = window.location.href;
  const text = `Ik maakte een persoonlijke reflectie via Middlepoint, misschien nuttig voor jou ook: ${link}`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}
function shareReflectionEmail() {
  const link = window.location.href;
  const subject = encodeURIComponent('Mijn Middlepoint reflectie');
  const body = encodeURIComponent(`Hoi,\n\nIk maakte een persoonlijke reflectie via Middlepoint.\n\nJe vindt ze hier: ${link}`);
  window.location.href = `mailto:?subject=${subject}&body=${body}`;
}

function goToSelfHelpPayment(token, email) {
  try { localStorage.setItem('mp_pending_selfhelp', token); } catch (e) {}
  const sep = SELF_HELP_STRIPE_LINK.includes('?') ? '&' : '?';
  window.location.href = email ? `${SELF_HELP_STRIPE_LINK}${sep}prefilled_email=${encodeURIComponent(email)}` : SELF_HELP_STRIPE_LINK;
}

const CATEGORY_OPTIONS = [
  { value: 'koppel', label: 'Koppel / relatie' },
  { value: 'familie', label: 'Familie' },
  { value: 'vrienden', label: 'Vrienden' },
  { value: 'buren', label: 'Buren' },
  { value: 'werk', label: "Werk / collega's" },
  { value: 'school', label: 'School' },
];

const CATEGORY_OTHER_LABEL = {
  koppel: 'je partner',
  familie: 'je familielid',
  vrienden: 'deze vriend of vriendin',
  buren: 'deze buur',
  werk: 'deze collega',
  school: 'deze persoon',
  andere: 'de ander',
};

const CATEGORY_THIRDPARTY_EXAMPLE = {
  koppel: 'bv. tussen mijn zus en haar partner',
  familie: 'bv. tussen mijn moeder en mijn oom',
  vrienden: 'bv. tussen twee vrienden uit mijn vriendengroep',
  buren: 'bv. tussen twee buren in mijn straat',
  werk: "bv. tussen twee collega's van mijn team",
  school: 'bv. tussen twee leerlingen in de klas',
  andere: 'bv. tussen ... en ...',
};

const GEVOEL_OPTIONS = [
  { value: 'boos', label: 'Boos' },
  { value: 'verdrietig', label: 'Verdrietig' },
  { value: 'jaloers', label: 'Jaloers' },
  { value: 'onzeker', label: 'Onzeker' },
  { value: 'gemis', label: 'Gemis of eenzaamheid' },
  { value: 'gefrustreerd', label: 'Gefrustreerd' },
  { value: 'teleurgesteld', label: 'Teleurgesteld' },
  { value: 'neutraal', label: 'Neutraal, geen uitgesproken gevoel' },
];

function renderForm() {
  app.innerHTML = `
    <span class="label">Gratis reflectie</span>
    <h1>Vertel wat er speelt</h1>
    <div class="card" style="background:#EFF4ED;border:none;margin-bottom:24px;padding:20px">
      <p style="margin:0 0 10px;font-weight:600">Zeg ons wat er op je lever ligt</p>
      <p style="margin:0 0 14px;color:var(--ink-soft);font-size:.92rem">Beantwoord de vragen hieronder. We laten je daarna weten: kan je dit zelf oplossen, of is een gesprek met de ander zinvol? Wil je nog dieper, met een concreet actieplan (Reflectie+, €2,99)? Dat kan meteen na je reflectie. Kiezen jullie voor een gesprek, dan starten we dat meteen voor je, met je verhaal al ingevuld.</p>
      <p style="margin:0;font-size:.85rem;border-top:1px solid var(--line);padding-top:12px">Weet je het al zeker? <a href="/new.html" style="font-weight:600">Start meteen een gesprek</a></p>
    </div>
    <p style="color:var(--ink-soft);font-size:.82rem;margin-bottom:24px">Dit is helemaal gratis, onbeperkt te gebruiken. <span style="color:var(--clay)">*</span> = verplichte vraag</p>

    <div id="error" class="error-box" style="display:none"></div>

    <form id="reflectionForm">
      <div class="field">
        <label for="rName">Jouw naam <span style="color:var(--clay)">*</span></label>
        <input type="text" id="rName" required placeholder="bv. Sarah">
      </div>
      <div class="field">
        <label for="rEmail">Jouw e-mailadres <span style="color:var(--clay)">*</span></label>
        <input type="email" id="rEmail" required placeholder="jij@email.be">
        <div class="help">Zodat je je reflectie kan terugvinden, en om je verder te helpen als je later een gesprek wil starten.</div>
      </div>
      <div class="field">
        <label for="rEmailConfirm">Herhaal je e-mailadres <span style="color:var(--clay)">*</span></label>
        <input type="email" id="rEmailConfirm" required placeholder="jij@email.be">
        <div class="help">Even dubbel typen om tikfouten te vermijden.</div>
      </div>

      <div class="q-block">
        <label class="q-label">Waar heeft dit betrekking op? <span style="color:var(--clay)">*</span></label>
        <select id="categorySelect" required style="width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-family:'Karla',sans-serif;font-size:16px;background:var(--white)">
          <option value="">Kies een categorie...</option>
          ${CATEGORY_OPTIONS.map(o => `<option value="${o.value}">${o.label}</option>`).join('')}
          <option value="__andere__">Iets anders, namelijk...</option>
        </select>
        <div class="field" id="categoryOtherField" style="display:none;margin-top:10px">
          <input type="text" id="categoryOther" placeholder="Omschrijf kort de situatie">
        </div>
      </div>

      <div class="q-block">
        <label class="q-label">Gaat dit rechtstreeks tussen jou en iemand anders, of ben je eerder betrokken bij, of getuige van, een situatie tussen anderen? <span style="color:var(--clay)">*</span></label>
        <div class="mc-group">
          <label class="mc-option"><input type="radio" name="perspectief" value="zelf" id="perspectiefZelf" checked><span>Dit gaat rechtstreeks tussen mij en de ander</span></label>
          <label class="mc-option"><input type="radio" name="perspectief" value="derde" id="perspectiefDerde"><span>Ik sta er zelf naast, dit speelt tussen anderen</span></label>
        </div>
        <div class="branch-box" id="perspectiefDerdeBranch" style="display:none">
          <label class="q-label" style="font-weight:500;font-size:.9rem" id="tussenWieLabel">Tussen wie speelt dit zich af?</label>
          <input type="text" id="tussenWie" style="width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-family:'Karla',sans-serif;font-size:16px" placeholder="">
        </div>
      </div>

      <div class="q-block" id="schoolAgeBlock" style="display:none">
        <label class="q-label">Wat is de leeftijd of het leerjaar van het betrokken kind?</label>
        <input type="text" id="qSchoolAge" style="width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:8px;font-family:'Karla',sans-serif;font-size:16px" placeholder="bv. 9 jaar, 4de leerjaar">
      </div>

      <div class="q-block">
        <label class="q-label">Wat gebeurde er precies? <span style="color:var(--clay)">*</span></label>
        <div class="q-note" style="margin-bottom:8px">Leg het gerust uitgebreid uit, hoe meer context, hoe beter we je kunnen helpen.</div>
        <textarea class="q-textarea" id="qWat" required placeholder="Beschrijf zo concreet mogelijk wat er gebeurde: wat werd er gezegd of gedaan, en hoe verliep het?"></textarea>
      </div>

      <div class="q-block">
        <label class="q-label">Wat voelde je op dat moment?</label>
        <div class="q-note" style="margin-bottom:8px">Je mag meerdere gevoelens aanvinken.</div>
        <div class="mc-group" id="gevoelGroup">
          ${GEVOEL_OPTIONS.map(o => `
            <label class="mc-option">
              <input type="checkbox" name="gevoel" value="${o.value}">
              <span>${o.label}</span>
            </label>`).join('')}
          <label class="mc-option">
            <input type="checkbox" id="gevoelAndereToggle" value="__andere__">
            <span>Een ander gevoel, ik schrijf het zelf op</span>
          </label>
          <input type="text" id="gevoelAndereInput" class="other-input" style="display:none" placeholder="Welk gevoel was dit?">
        </div>
        <div id="qGevoelTekstWrap" style="display:none">
          <textarea class="q-textarea" id="qGevoelTekst" style="min-height:70px;margin-top:10px" placeholder="Wil je dit gevoel nog even toelichten? (optioneel)"></textarea>
        </div>
      </div>

      <div class="q-block">
        <label class="q-label" id="qNodigLabel">Wat denk je dat je eigenlijk nodig had op dat moment? *</label>
        <textarea class="q-textarea" id="qNodig" required style="min-height:80px"></textarea>
      </div>

      <div class="q-block">
        <label class="q-label">Heb je dit gevoel al vaker ervaren, in andere situaties of met andere mensen?</label>
        <div class="mc-group">
          <label class="mc-option"><input type="radio" name="herkenning" value="ja" id="herkenningJa"><span>Ja</span></label>
          <label class="mc-option"><input type="radio" name="herkenning" value="nee" id="herkenningNee"><span>Nee</span></label>
          <label class="mc-option"><input type="radio" name="herkenning" value="weet niet" id="herkenningWeetNiet"><span>Ik weet het niet</span></label>
        </div>
        <div class="branch-box" id="herkenningBranch" style="display:none">
          <textarea class="q-textarea" id="qHerkenningTekst" style="min-height:70px" placeholder="Waar herken je dit nog van, of wat maakt dat je het niet zeker weet?"></textarea>
        </div>
      </div>

      <div class="q-block">
        <label class="q-label">Denk je dat er meer onder deze situatie zit dan wat er op het eerste zicht speelt?</label>
        <div class="mc-group">
          <label class="mc-option"><input type="radio" name="dieper" value="ja" id="dieperJa"><span>Ja</span></label>
          <label class="mc-option"><input type="radio" name="dieper" value="nee" id="dieperNee"><span>Nee</span></label>
          <label class="mc-option"><input type="radio" name="dieper" value="weet niet" id="dieperWeetNiet"><span>Ik weet het niet</span></label>
        </div>
        <div class="branch-box" id="dieperBranch" style="display:none">
          <textarea class="q-textarea" id="qDieperTekst" style="min-height:70px" placeholder="Wat zou er volgens jou nog meer kunnen meespelen?"></textarea>
        </div>
      </div>

      <div class="q-block">
        <label class="q-label">Hoe diep raakt dit jou eigenlijk?</label>
        <div class="scale-row" id="scaleRow">
          ${[1,2,3,4,5].map(n => `
            <label class="scale-option">
              <input type="radio" name="diepgang" value="${n}">
              <span>${n}</span>
            </label>`).join('')}
        </div>
        <div class="scale-labels"><span>Oppervlakkig</span><span>Heel diep</span></div>
      </div>

      <div class="q-block">
        <label class="q-label">Nog iets dat je kwijt wil? (optioneel)</label>
        <textarea class="q-textarea" id="qExtra" style="min-height:70px"></textarea>
      </div>

      <button type="submit" class="btn clay" style="width:100%;padding:14px">Bekijk mijn reflectie</button>
    </form>
  `;

  document.querySelectorAll('#gevoelGroup input[name=gevoel]').forEach(cb => {
    cb.addEventListener('change', () => {
      const anyChecked = document.querySelectorAll('#gevoelGroup input[name=gevoel]:checked').length > 0;
      document.getElementById('qGevoelTekstWrap').style.display = anyChecked ? 'block' : 'none';
    });
  });
  document.getElementById('gevoelAndereToggle').addEventListener('change', (e) => {
    document.getElementById('gevoelAndereInput').style.display = e.target.checked ? 'block' : 'none';
    document.getElementById('qGevoelTekstWrap').style.display = 'block';
  });
  document.getElementById('gevoelAndereInput').addEventListener('input', (e) => {
    const toggle = document.getElementById('gevoelAndereToggle');
    if (e.target.value.trim() && !toggle.checked) {
      toggle.checked = true;
      toggle.dispatchEvent(new Event('change', { bubbles: true }));
    }
  });

  function updateNodigLabel() {
    const val = categorySelect.value;
    const isThirdParty = document.getElementById('perspectiefDerde').checked;
    const label = CATEGORY_OTHER_LABEL[val] || 'de ander';
    if (isThirdParty) {
      document.getElementById('qNodigLabel').textContent = 'Wat denk je dat er nodig zou zijn om dit tussen hen op te lossen? *';
    } else {
      document.getElementById('qNodigLabel').textContent = `Wat denk je dat je eigenlijk nodig had van ${label} op dat moment? *`;
    }
  }

  const categorySelect = document.getElementById('categorySelect');
  categorySelect.addEventListener('change', () => {
    const val = categorySelect.value;
    document.getElementById('categoryOtherField').style.display = val === '__andere__' ? 'block' : 'none';
    document.getElementById('schoolAgeBlock').style.display = val === 'school' ? 'block' : 'none';
    document.getElementById('tussenWie').placeholder = CATEGORY_THIRDPARTY_EXAMPLE[val] || CATEGORY_THIRDPARTY_EXAMPLE.andere;
    updateNodigLabel();
  });

  document.querySelectorAll('input[name=perspectief]').forEach(r => {
    r.addEventListener('change', (e) => {
      document.getElementById('perspectiefDerdeBranch').style.display = e.target.value === 'derde' ? 'block' : 'none';
      updateNodigLabel();
    });
  });

  document.querySelectorAll('input[name=herkenning]').forEach(r => {
    r.addEventListener('change', (e) => {
      document.getElementById('herkenningBranch').style.display = e.target.value === 'nee' ? 'none' : 'block';
    });
  });
  document.querySelectorAll('input[name=dieper]').forEach(r => {
    r.addEventListener('change', (e) => {
      document.getElementById('dieperBranch').style.display = e.target.value === 'nee' ? 'none' : 'block';
    });
  });

  document.getElementById('reflectionForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById('error');
    errorBox.style.display = 'none';

    const name = document.getElementById('rName').value.trim();
    const email = document.getElementById('rEmail').value.trim();
    const emailConfirm = document.getElementById('rEmailConfirm').value.trim();
    let category = categorySelect.value;
    if (!category) {
      errorBox.textContent = 'Kies eerst een categorie.';
      errorBox.style.display = 'block';
      return;
    }
    if (category === '__andere__') {
      category = document.getElementById('categoryOther').value.trim();
      if (!category) {
        errorBox.textContent = 'Omschrijf kort de situatie.';
        errorBox.style.display = 'block';
        return;
      }
    }

    const perspectief = (document.querySelector('input[name=perspectief]:checked') || {}).value || 'zelf';
    const tussenWie = document.getElementById('tussenWie').value.trim();
    const gevoelen = Array.from(document.querySelectorAll('#gevoelGroup input[name=gevoel]:checked')).map(c => c.closest('label').querySelector('span').textContent);
    const gevoelAndere = document.getElementById('gevoelAndereInput').value.trim();
    if (document.getElementById('gevoelAndereToggle').checked && gevoelAndere) gevoelen.push(gevoelAndere);
    const dieperChecked = (document.querySelector('input[name=dieper]:checked') || {}).value;
    const diepgangChecked = document.querySelector('input[name=diepgang]:checked');
    const herkenning = (document.querySelector('input[name=herkenning]:checked') || {}).value;

    if (!name || !email || !emailConfirm) {
      errorBox.textContent = 'Vul je naam en e-mailadres in.';
      errorBox.style.display = 'block';
      return;
    }
    if (email.toLowerCase() !== emailConfirm.toLowerCase()) {
      errorBox.textContent = 'De twee e-mailadressen komen niet overeen. Controleer even of je jouw adres correct herhaald hebt.';
      errorBox.style.display = 'block';
      document.getElementById('rEmailConfirm').scrollIntoView({ behavior: 'smooth' });
      return;
    }

    const lines = [];
    if (perspectief === 'derde') {
      lines.push(`Vraag: Gaat dit rechtstreeks tussen jou en iemand anders, of sta je ernaast?\nAntwoord: Ik sta er zelf naast, dit speelt tussen anderen${tussenWie ? ': ' + tussenWie : ''}.`);
    }
    const schoolAge = document.getElementById('qSchoolAge') ? document.getElementById('qSchoolAge').value.trim() : '';
    if (categorySelect.value === 'school' && schoolAge) {
      lines.push(`Vraag: Leeftijd of leerjaar van het betrokken kind\nAntwoord: ${schoolAge}`);
    }
    lines.push(`Vraag: Wat gebeurde er precies?\nAntwoord: ${document.getElementById('qWat').value.trim()}`);
    if (gevoelen.length) lines.push(`Vraag: Wat voelde je op dat moment?\nAntwoord: ${gevoelen.join(', ')}`);
    const gevoelTekst = document.getElementById('qGevoelTekst').value.trim();
    if (gevoelTekst) lines.push(`Vraag: Aanvulling bij het gevoel\nAntwoord: ${gevoelTekst}`);
    lines.push(`Vraag: ${document.getElementById('qNodigLabel').textContent}\nAntwoord: ${document.getElementById('qNodig').value.trim()}`);
    if (herkenning) {
      const herkenningTekst = document.getElementById('qHerkenningTekst').value.trim();
      lines.push(`Vraag: Herken je dit van eerder?\nAntwoord: ${herkenning}${herkenningTekst ? ', ' + herkenningTekst : ''}`);
    }
    if (dieperChecked) {
      const dieperTekst = document.getElementById('qDieperTekst').value.trim();
      let answer = dieperChecked;
      if (dieperTekst) answer += `. Toelichting: ${dieperTekst}`;
      lines.push(`Vraag: Ging dit puur hierover, of zit er meer onder?\nAntwoord: ${answer}`);
    }
    if (diepgangChecked) {
      const val = parseInt(diepgangChecked.value, 10);
      const answer = val <= 2 ? 'Dichter bij: oppervlakkig' : val >= 4 ? 'Dichter bij: heel diep' : 'Ergens in het midden';
      lines.push(`Vraag: Hoe diep raakt dit jou?\nAntwoord: ${answer}`);
    }
    const extra = document.getElementById('qExtra').value.trim();
    if (extra) lines.push(`Vraag: Nog iets om toe te voegen?\nAntwoord: ${extra}`);

    const content = lines.join('\n\n');

    app.innerHTML = `<div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line" style="height:32px;width:70%;margin-bottom:20px"></div><div class="skeleton skeleton-block"></div>`;

    try {
      const res = await fetch('/.netlify/functions/create-reflection', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name, category, content, perspective: perspectief, thirdPartyContext: tussenWie }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      window.history.replaceState({}, '', `/reflectie.html?token=${data.token}`);
      pollResult(data.token);
    } catch (err) {
      renderForm();
      document.getElementById('error').textContent = err.message;
      document.getElementById('error').style.display = 'block';
    }
  });
}

        </div>
        <div id="shQ1TekstWrap" style="display:none">
          <textarea class="q-textarea" id="shQ1Tekst" style="min-height:60px;margin-top:10px" placeholder="Wil je dit nog toelichten? (optioneel)"></textarea>
        </div>
      </div>

      <div class="q-block">
        <label class="q-label">Wat houdt je nu tegen om hier zelf al mee aan de slag te gaan?</label>
        <div class="q-note" style="margin-bottom:8px">Je mag meerdere opties aanvinken.</div>
        <div class="mc-group" id="shQ2Group">
          ${SELFHELP_Q2_OPTIONS.map(o => `
            <label class="mc-option"><input type="checkbox" name="shq2" value="${o}"><span>${o}</span></label>`).join('')}
          <label class="mc-option"><input type="checkbox" id="shQ2AndereToggle"><span>Iets anders, ik schrijf het zelf op</span></label>
          <input type="text" id="shQ2AndereInput" class="other-input" style="display:none" placeholder="Wat houdt jou tegen?">
        </div>
        <div id="shQ2TekstWrap" style="display:none">
          <textarea class="q-textarea" id="shQ2Tekst" style="min-height:60px;margin-top:10px" placeholder="Wil je dit nog toelichten? (optioneel)"></textarea>
        </div>
      </div>

      <div class="q-block">
        <label class="q-label">Als je over een maand terugkijkt, wat zou je dan graag anders zien?</label>
        <div class="q-note" style="margin-bottom:8px">Je mag meerdere opties aanvinken.</div>
        <div class="mc-group" id="shQ3Group">
          ${SELFHELP_Q3_OPTIONS.map(o => `

      return { vals, tekst };
    }
    const q1 = collect('1');
    const q2 = collect('2');
    const q3 = collect('3');

    if (!q1.vals.length && !q2.vals.length && !q3.vals.length) {
      errorBox.textContent = 'Vul minstens iets in bij één van de vragen.';

    if (q3.vals.length) lines.push(`Vraag: Als je over een maand terugkijkt, wat zou je dan graag anders zien?\nAntwoord: ${q3.vals.join(', ')}${q3.tekst ? '. Toelichting: ' + q3.tekst : ''}`);
    Array.from(document.querySelectorAll('.shEarlierAnswer')).forEach(t => {
      const answer = t.value.trim();
      if (answer) lines.push(`Vraag: ${t.dataset.question}\nAntwoord: ${answer}`);
    });

    app.innerHTML = `<div class="skeleton skeleton-line short"></div><div class="skeleton skeleton-line" style="height:32px;width:70%;margin-bottom:20px"></div><div class="skeleton skeleton-block"></div>`;

    try {
      const res = await fetch('/.netlify/functions/submit-selfhelp', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, content: lines.join('\n\n') }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      try { localStorage.setItem('mp_justpaid_selfhelp', token); } catch (e) {}
      window.history.replaceState({}, '', `/reflectie.html?token=${token}`);
      pollResult(token);
    } catch (err) {
      renderSelfHelpForm(token);
      document.getElementById('shError').textContent = err.message;
      document.getElementById('shError').style.display = 'block';
    }
  });
}

async function pollResult(token) {
  try {

if (selfhelpReturn) {

    renderSelfHelpForm(pendingToken);

    app.innerHTML = `<div class="error-box">We konden je reflectie niet automatisch terugvinden. Gebruik de link uit je bevestigingsmail, of neem contact op via middlepoint@zohomail.eu.</div>`;

} else if (existingToken) {
  pollResult(existingToken);
} else {
  renderForm();
}
