<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn gesprekken, Middlepoint</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="nav-bar">
<nav class="nav">
  <a href="/" class="brand">middle<span>point</span></a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/why.html">Waarom Middlepoint</a>
    <a href="/pricing.html">Prijzen</a>
    <a href="/testimonials.html">Getuigenissen</a>
    <a href="/login.html" class="current">Mijn gesprekken</a>
    <a href="/new.html" class="btn">Start een gesprek</a>
  </div>
</nav>
</header>

<div class="app-wrap" id="app">
  <div class="status-box">Even laden...</div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');
const app = document.getElementById('app');
const STRIPE_PORTAL = 'https://billing.stripe.com/p/login/28EcN55IM0rig6J1B9aVa00';

function statusLabel(status) {
  const labels = {
    wachten_op_verhalen: 'Wachten op verhalen',
    verhalen_klaar_vervolgvragen_genereren: 'Vervolgvragen worden voorbereid',
    wachten_op_vervolgvragen: 'Wachten op vervolgvragen',
    document_genereren: 'Document wordt opgesteld',
    klaar: 'Klaar',
    veiligheid_gestopt: 'Gestopt om veiligheidsredenen',
    document_mislukt: 'Er ging iets mis, neem contact op',
  };
  if ((status || '').startsWith('nieuwe_ronde_')) return 'Opvolging bezig';
  return labels[status] || status;
}

function planLabel(plan) {
  const labels = { gratis: 'Gratis', los: 'Eén gesprek', starter: 'Starter', plus: 'Plus', pro: 'Pro' };
  return labels[plan] || plan;
}

function withReturnParam(link) {
  const sep = link.includes('?') ? '&' : '?';
  return `${link}${sep}from=${encodeURIComponent(token)}`;
}

async function loadSessionLinks(sessionToken, containerId) {
  const box = document.getElementById(containerId);
  box.innerHTML = '<p style="color:var(--ink-soft);font-size:.85rem">Even laden...</p>';
  try {
    const res = await fetch(`/.netlify/functions/get-session-links?token=${sessionToken}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
  box.innerHTML = data.links.map(l => `
      <div style="margin-bottom:10px">
        <div style="font-size:.82rem;color:var(--ink-soft);margin-bottom:4px">${l.name}${l.isOrganizer ? ' (jij)' : ''} · ${l.email || 'geen e-mailadres'}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
          <input type="text" readonly value="${window.location.origin}${l.accessLink}" style="flex:1;padding:8px;border:1px solid var(--line);border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:.75rem">
          <button onclick="navigator.clipboard.writeText('${window.location.origin}${l.accessLink}')" class="icon-btn" title="Kopieer">📋</button>
        </div>
      ${!l.isOrganizer ? `
        <div style="font-size:.72rem;color:var(--ink-soft);margin-bottom:4px">E-mailadres van ${l.name} wijzigen</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="email" id="emailEdit_${l.id}" placeholder="Nieuw e-mailadres" value="${l.email || ''}" style="flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:.78rem">
        <button type="button" class="btn outline" style="padding:6px 10px;font-size:.75rem" onclick="updateParticipantEmail('${sessionToken}', '${l.id}', 'emailEdit_${l.id}', this)">Wijzig e-mail</button>
        </div>
        <div id="emailEditMsg_${l.id}" style="font-size:.75rem;margin-top:4px"></div>` : ''}
      </div>`).join('');
  } catch (err) {
    box.innerHTML = `<p style="color:#8A4222;font-size:.85rem">${err.message}</p>`;
  }
}
async function updateParticipantEmail(sessionToken, participantId, inputId, btn) {
  const input = document.getElementById(inputId);
  const msg = document.getElementById(`emailEditMsg_${participantId}`);
  const newEmail = input.value.trim();
  msg.textContent = '';
  msg.style.color = '';
  if (!newEmail || !newEmail.includes('@')) {
    msg.style.color = '#8A4222';
    msg.textContent = 'Vul een geldig e-mailadres in.';
    return;
  }
  btn.disabled = true;
  const oldLabel = btn.textContent;
  btn.textContent = 'Bezig...';
  try {
    const res = await fetch('/.netlify/functions/update-participant-email', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ organizerToken: sessionToken, participantId, newEmail }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    msg.style.color = 'var(--sage)';
    msg.textContent = 'Gelukt. Deze persoon kreeg een mail met zijn link naar dit nieuwe adres.';
  } catch (err) {
    msg.style.color = '#8A4222';
    msg.textContent = err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = oldLabel;
  }
}

async function startFollowup(accessLinkWithReturn, btn) {  const t = new URLSearchParams(accessLinkWithReturn.split('?')[1]).get('token');
  btn.disabled = true;
  btn.textContent = 'Even geduld...';
  try {
    const res = await fetch('/.netlify/functions/start-new-round', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: t }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    window.location.href = accessLinkWithReturn;
  } catch (err) {
    btn.disabled = false;
    btn.textContent = 'Vul opvolgdocument in';
    alert(err.message);
  }
}

async function deleteSession(sessionId, btn) {
  if (!confirm('Weet je zeker dat je dit gesprek definitief wil verwijderen? Dit kan niet ongedaan gemaakt worden.')) return;
  btn.disabled = true;
  btn.textContent = 'Bezig...';
  try {
    const res = await fetch('/.netlify/functions/delete-session', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ magicToken: token, sessionId }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    load();
  } catch (err) {
    alert(err.message);
    btn.disabled = false;
    btn.textContent = 'Verwijder gesprek';
  }
}

async function load() {
  if (!token) {
    app.innerHTML = `
      <span class="label">Mijn gesprekken</span>
      <h1>Inloggen vereist</h1>
      <p style="color:var(--ink-soft)">Gebruik de link uit je e-mail om je gesprekken te bekijken.</p>
      <a href="/login.html" class="btn clay">Naar inlogpagina</a>`;
    return;
  }

  try {
    const res = await fetch(`/.netlify/functions/get-my-sessions?token=${token}`);
    const data = await res.json();

    if (!res.ok) {
      app.innerHTML = `
        <span class="label">Fout</span>
        <h1>Link ongeldig of verlopen</h1>
        <p style="color:var(--ink-soft)">${data.error}</p>
        <a href="/login.html" class="btn clay">Vraag een nieuwe link op</a>`;
      return;
    }

    const isPaidPlan = data.plan && data.plan !== 'gratis';

    if (data.sessions.length === 0) {
      app.innerHTML = `
        <span class="label">Mijn gesprekken</span>
        <h1>Geen gesprekken gevonden</h1>
        <p style="color:var(--ink-soft)">We vonden geen gesprekken gekoppeld aan ${data.email}.</p>
        <a href="/new.html" class="btn clay">Start een nieuw gesprek</a>`;
      return;
    }

    app.innerHTML = `
      <span class="label">Mijn gesprekken</span>
      <h1>Welkom terug</h1>
     <p style="color:var(--ink-soft);margin-bottom:8px">Ingelogd als <strong id="currentEmailDisplay">${data.email}</strong> · <button type="button" id="changeEmailToggle" class="btn outline" style="padding:4px 10px;font-size:.75rem;vertical-align:middle">Wijzig e-mailadres</button></p>
      <div id="changeEmailBox" style="display:none;max-width:420px;margin-bottom:16px" class="card">
        <div class="field">
          <label for="newEmailInput">Nieuw e-mailadres</label>
          <input type="email" id="newEmailInput" placeholder="nieuw@email.be">
        </div>
        <button type="button" id="submitEmailChange" class="btn clay" style="padding:9px 16px;font-size:.85rem">Bevestigen</button>
        <div id="changeEmailMsg" style="margin-top:8px;font-size:.85rem"></div>
        <p style="font-size:.78rem;color:var(--ink-soft);margin-top:8px">Dit wijzigt je e-mailadres overal: al je gesprekken, je plan en je login bij Mijn gesprekken.</p>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px">
        <span style="font-family:'IBM Plex Mono',monospace;font-size:.78rem;background:var(--clay-soft);color:var(--clay);padding:4px 10px;border-radius:999px">${planLabel(data.plan)}</span>
        ${isPaidPlan ? `<a href="${STRIPE_PORTAL}" target="_blank" class="btn outline" style="padding:7px 14px;font-size:.82rem">Abonnement beheren of opzeggen</a>` : ''}
      </div>

      ${isPaidPlan ? `
      <div class="card" style="background:#EFF4ED;border:none;margin-bottom:24px;padding:16px">
        <p style="margin:0;font-size:.85rem">Al je documenten blijven hier altijd terug te vinden, ook je opvolgdocumenten en je eigen ingevulde antwoorden. Zodra jullie document klaar is, kan je hieronder op elk moment een opvolging starten, je hoeft daar niet op te wachten.</p>
      </div>` : ''}

      <div id="sessionsList"></div>
      <div style="margin-top:32px">
        <a href="/new.html" class="btn outline">Start een nieuw gesprek</a>
      </div>`;
document.getElementById('changeEmailToggle').addEventListener('click', () => {
      const box = document.getElementById('changeEmailBox');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    });
    document.getElementById('submitEmailChange').addEventListener('click', async () => {
      const btn = document.getElementById('submitEmailChange');
      const msg = document.getElementById('changeEmailMsg');
      const newEmail = document.getElementById('newEmailInput').value.trim();
      msg.textContent = '';
      msg.style.color = '';
      if (!newEmail || !newEmail.includes('@')) {
        msg.style.color = '#8A4222';
        msg.textContent = 'Vul een geldig e-mailadres in.';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Bezig...';
      try {
        const res = await fetch('/.netlify/functions/update-my-email', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newEmail }),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error);
        msg.style.color = 'var(--sage)';
        msg.textContent = 'Gelukt! Je e-mailadres is overal gewijzigd. Deze pagina herlaadt zo.';
        setTimeout(() => window.location.reload(), 1800);
      } catch (err) {
        msg.style.color = '#8A4222';
        msg.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Bevestigen';
      }
    });

    const list = document.getElementById('sessionsList');
    data.sessions.forEach((s, idx) => {
      const card = document.createElement('div');
      card.className = 'person-block';
      card.style.marginBottom = '16px';

      const isKlaar = s.status === 'klaar';
      const isFollowupBezig = (s.status || '').startsWith('nieuwe_ronde_');
      const statusText = statusLabel(s.status);
      const linksBoxId = `linksBox_${idx}`;
      const accessLinkWithReturn = withReturnParam(s.accessLink);
      const documentLinkWithReturn = s.documentLink ? withReturnParam(s.documentLink) : null;

      // s.followupUsed moet nog door get-my-sessions.js meegegeven worden. Tot dat er is,
      // valt dit terug op "niet gebruikt", dus de knop kan tijdelijk nog verkeerd tonen
      // na een al ingevulde opvolging.
      const followupUsed = !!s.followupUsed;

      let followupButton = '';
      if (isKlaar && s.plan && s.plan !== 'gratis' && !followupUsed) {
        followupButton = `<button type="button" class="btn outline" style="padding:9px 16px;font-size:.85rem" onclick="startFollowup('${window.location.origin}${accessLinkWithReturn}', this)">Vul opvolgdocument in</button>`;
      } else if (isFollowupBezig) {
        followupButton = `<a href="${accessLinkWithReturn}" class="btn outline" style="padding:9px 16px;font-size:.85rem">Ga verder met opvolging</a>`;
      }

      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <div class="who">${s.category}</div>
            <div style="font-size:.85rem;color:var(--ink-soft);margin-top:4px">
              ${new Date(s.createdAt).toLocaleDateString('nl-BE', { day: 'numeric', month: 'long', year: 'numeric' })}
            </div>
          </div>
          <span style="font-family:'IBM Plex Mono',monospace;font-size:.72rem;padding:4px 10px;border-radius:999px;background:${isKlaar || isFollowupBezig ? '#EFF4ED' : 'var(--clay-soft)'};color:${isKlaar || isFollowupBezig ? 'var(--sage)' : 'var(--clay)'}">
            ${statusText}
          </span>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px">
         <a href="${accessLinkWithReturn}" class="btn outline" style="padding:9px 16px;font-size:.85rem">Mijn verhaal / status</a>
          <a href="${accessLinkWithReturn}&view=antwoorden" class="btn outline" style="padding:9px 16px;font-size:.85rem">Bekijk mijn antwoorden</a>
          ${documentLinkWithReturn ? `<a href="${documentLinkWithReturn}" class="btn clay" style="padding:9px 16px;font-size:.85rem">Bekijk document</a>` : ''}
          ${followupButton}
          ${s.isOrganizer ? `<button class="btn outline" style="padding:9px 16px;font-size:.85rem" onclick="toggleLinks('${s.accessLink.split('token=')[1]}', '${linksBoxId}', this)">Bekijk alle links</button>` : ''}
        </div>
        ${s.isOrganizer ? `<div id="${linksBoxId}" style="display:none;margin-top:8px"></div>` : ''}
        <div style="border-top:1px solid var(--line);padding-top:10px;margin-top:4px">
          <button type="button" class="btn outline" style="padding:8px 14px;font-size:.8rem;color:#8A4222;border-color:#8A4222" onclick="deleteSession('${s.sessionId}', this)">Verwijder gesprek</button>
        </div>`;

      list.appendChild(card);
    });

  } catch (err) {
    app.innerHTML = `<div class="error-box">Er ging iets mis: ${err.message}</div>`;
  }
}

function toggleLinks(sessionToken, containerId, btn) {
  const box = document.getElementById(containerId);
  if (box.style.display === 'none') {
    box.style.display = 'block';
    btn.textContent = 'Verberg links';
    loadSessionLinks(sessionToken, containerId);
  } else {
    box.style.display = 'none';
    btn.textContent = 'Bekijk alle links';
  }
}

load();
</script>
</body>
</html>
