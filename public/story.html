<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jouw verhaal, Middlepoint</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="nav-bar">
<nav class="nav">
  <a href="/" class="brand">middle<span>point</span></a>
</nav>
</header>

<div class="app-wrap" id="app">
  <div class="status-box">Even laden...</div>
</div>

<script>
const token = new URLSearchParams(window.location.search).get('token');
const app = document.getElementById('app');

function draftKey(suffix) { return `mp_draft_${suffix}_${token}`; }
function saveDraft(suffix, value) { try { localStorage.setItem(draftKey(suffix), value); } catch (e) {} }
function loadDraft(suffix) { try { return localStorage.getItem(draftKey(suffix)) || ''; } catch (e) { return ''; } }
function clearDraft(suffix) { try { localStorage.removeItem(draftKey(suffix)); } catch (e) {} }

async function load() {
  if (!token) { app.innerHTML = '<div class="error-box">Geen geldige link. Vraag de organisator om de link opnieuw te sturen, of <a href="/find-link.html">vraag je link hier opnieuw op</a>.</div>'; return; }
  const res = await fetch(`/.netlify/functions/get-session?token=${token}`);
  const data = await res.json();
  if (!res.ok) { app.innerHTML = `<div class="error-box">${data.error}</div>`; return; }
  render(data);
}

function otherNames(data) {
  return (data.allParticipants || [])
    .filter(p => !p.is_organizer && p.id !== data.participant.id)
    .map(p => p.display_name)
    .join(' en ');
}

function render(data) {
  const { participant, session, myEntries, myFollowups } = data;
  const round1Done = myEntries.some(e => e.round === 1);
  const round2Done = myEntries.some(e => e.round === 2);

  const isPureThirdParty = participant.isOrganizer && !!session.organizer_role;

  if (isPureThirdParty) {
    app.innerHTML = `<span class="label">${session.category}</span>
      <h1>Hallo ${participant.name}</h1>
      <p style="color:var(--ink-soft)">Jij bent organisator van dit gesprek. Je hoeft zelf geen verhaal in te vullen. Status: <strong>${statusLabel(session.status)}</strong>.</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="/document.html?token=${token}" class="btn clay">Naar het document</a>
        <a href="/" class="btn outline">Terug naar startpagina</a>
      </div>
      <p style="margin-top:20px;font-size:.85rem;color:var(--ink-soft)">Bewaar deze pagina (of je e-mail met deze link) om later terug te keren.</p>`;
    return;
  }

  if (!round1Done) {
    renderStoryForm(participant.name);
  } else if (session.status === 'veiligheid_gestopt') {
    renderCrisisMessage();
  } else if (session.status === 'wachten_op_verhalen') {
    const wie = otherNames(data) || 'de andere deelnemer(s)';
    app.innerHTML = `<span class="label">${session.category}</span>
      <h1>Bedankt, ${participant.name}</h1>
      <div class="status-box">Jouw verhaal is opgeslagen. We wachten nu op het verhaal van <strong>${wie}</strong>. Zodra die er is, gaan we verder. Deze pagina herlaadt zelf, je mag ze gerust sluiten en later teruggaan.</div>`;
    setTimeout(load, 10000);
  } else if (session.status === 'verhalen_klaar_vervolgvragen_genereren') {
    app.innerHTML = `<span class="label">${session.category}</span>
      <h1>Bedankt, ${participant.name}</h1>
      <div class="status-box">We bekijken jullie beide verhalen en bereiden gerichte vervolgvragen voor.<br>Dit duurt meestal 1-2 minuten. Deze pagina herlaadt zelf.</div>`;
    setTimeout(load, 8000);
  } else if (session.status === 'wachten_op_vervolgvragen' && myFollowups && !round2Done) {
    renderFollowupForm(myFollowups, participant.name);
  } else if (session.status === 'wachten_op_vervolgvragen' && !myFollowups) {
    app.innerHTML = `<div class="status-box">Vervolgvragen worden nog voorbereid. Even geduld.</div>`;
    setTimeout(load, 5000);
  } else if (round2Done && session.status === 'wachten_op_vervolgvragen') {
    const wie = otherNames(data) || 'de andere deelnemer(s)';
    app.innerHTML = `<span class="label">${session.category}</span>
      <h1>Bedankt, ${participant.name}</h1>
      <div class="status-box">We wachten nu op de vervolgvragen van <strong>${wie}</strong>. Deze pagina herlaadt zelf.</div>`;
    setTimeout(load, 8000);
  } else if (session.status === 'document_genereren') {
    app.innerHTML = `<span class="label">${session.category}</span>
      <h1>Bijna klaar</h1>
      <div class="status-box">Het document wordt nu opgesteld. Dit duurt meestal 1-2 minuten. Deze pagina herlaadt zelf.</div>`;
    setTimeout(load, 8000);
  } else if (session.status === 'klaar') {
    app.innerHTML = `<span class="label">${session.category}</span>
      <h1>Jullie document is klaar</h1>
      <p style="color:var(--ink-soft)">Het eerlijke, neutrale rapport staat klaar om te bekijken.</p>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <a href="/document.html?token=${token}" class="btn clay">Bekijk document</a>
        <a href="/" class="btn outline">Terug naar startpagina</a>
      </div>`;
  } else if ((session.status || '').startsWith('nieuwe_ronde_')) {
    const round = parseInt(session.status.split('_').pop(), 10);
    const alreadyDone = myEntries.some(e => e.round === round);
    if (alreadyDone) {
      const wie = otherNames(data) || 'de andere deelnemer(s)';
      app.innerHTML = `<span class="label">${session.category}</span>
        <h1>Bedankt voor de aanvulling</h1>
        <div class="status-box">We wachten nu op de aanvulling van <strong>${wie}</strong>.</div>`;
      setTimeout(load, 8000);
    } else {
      renderCheckinForm(round, participant.name);
    }
  } else {
    app.innerHTML = `<div class="status-box">Bezig...</div>`;
    setTimeout(load, 6000);
  }
}

function statusLabel(status) {
  const labels = {
    wachten_op_verhalen: 'wachten op de verhalen',
    verhalen_klaar_vervolgvragen_genereren: 'vervolgvragen worden voorbereid',
    wachten_op_vervolgvragen: 'wachten op de vervolgvragen',
    document_genereren: 'document wordt opgesteld',
    klaar: 'klaar',
    veiligheid_gestopt: 'gestopt om veiligheidsredenen',
  };
  return labels[status] || (status || '').startsWith('nieuwe_ronde_') ? 'nieuwe check-in bezig' : (labels[status] || status);
}

function renderCrisisMessage() {
  app.innerHTML = `
    <span class="label">Belangrijk</span>
    <h1>Dit overstijgt wat wij kunnen helpen oplossen</h1>
    <p style="color:var(--ink-soft)">Op basis van wat er geschreven is, denken we dat professionele of gespecialiseerde hulp nu belangrijker is dan een document. Je staat er niet alleen voor.</p>
    <div class="status-box" style="text-align:left">
      <p><strong>Zelfmoordlijn (BE):</strong> 1813, <a href="https://www.zelfmoord1813.be" target="_blank">zelfmoord1813.be</a></p>
      <p><strong>1712, Geweld, Misbruik, Kindermishandeling (BE):</strong> 1712, <a href="https://www.1712.be" target="_blank">1712.be</a></p>
      <p><strong>Internationaal overzicht:</strong> <a href="https://findahelpline.com" target="_blank">findahelpline.com</a></p>
      <p style="margin-top:16px;color:var(--ink-soft);font-size:.85rem">Als je in direct gevaar bent, bel de noodnummers (112/101).</p>
    </div>`;
}

function renderStoryForm(name) {
  const existingDraft = loadDraft('story');
  app.innerHTML = `
    <span class="label">Jouw kant van het verhaal</span>
    <h1>Vertel wat er gebeurd is</h1>
    <div class="status-box" style="background:var(--clay-soft);border:none;text-align:left;margin-bottom:20px;color:var(--ink)">
      Je vult dit in als <strong>${name}</strong>. Is dit niet jouw naam? Sluit deze pagina en vraag de juiste link op bij wie het gesprek startte, of <a href="/find-link.html">vraag je eigen link hier op</a>.
    </div>
    ${existingDraft ? '<div class="draft-notice">We hebben een eerder bewaard concept teruggevonden en alvast ingevuld.</div>' : ''}
    <p style="color:var(--ink-soft)">Schrijf zo eerlijk en volledig mogelijk. Niemand anders ziet dit totdat het verwerkt is tot het rapport.</p>
    <div id="error" class="error-box" style="display:none"></div>
    <form id="storyForm">
      <div class="field">
        <label for="duration">Hoelang speelt dit al?</label>
        <select id="duration">
          <option value="enkele dagen">Enkele dagen</option>
          <option value="enkele weken">Enkele weken</option>
          <option value="enkele maanden" selected>Enkele maanden</option>
          <option value="meer dan een jaar">Meer dan een jaar</option>
          <option value="al heel lang, jaren">Al heel lang (jaren)</option>
        </select>
      </div>
      <div class="field">
        <button type="button" id="toggleHints" class="btn outline" style="padding:8px 16px;font-size:.85rem;margin-bottom:12px">Hulp nodig om te beginnen?</button>
        <div id="hintChips" style="display:none;margin-bottom:14px">
          <p class="help" style="margin-bottom:8px">Klik op een vraag om ze toe te voegen, en beantwoord ze in het tekstveld hieronder. Allemaal optioneel.</p>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            <button type="button" class="hint-chip">Wat is er precies gebeurd?</button>
            <button type="button" class="hint-chip">Hoe voelde jij je daarbij?</button>
            <button type="button" class="hint-chip">Wat denk je dat de ander voelde?</button>
            <button type="button" class="hint-chip">Wat zou je willen dat er verandert?</button>
            <button type="button" class="hint-chip">Wat heb je zelf al geprobeerd?</button>
          </div>
        </div>
        <div id="storyText" class="editable-field" contenteditable="true" data-placeholder="Begin maar...">${existingDraft}</div>
        <div class="help" id="charCount">0 / 2000 tekens</div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="anon">
        <label for="anon">Vermeld mijn naam niet bij dit specifieke verhaal in het document (anoniem)</label>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button type="submit" class="btn clay" style="flex:1;padding:14px">Verhaal versturen</button>
        <button type="button" id="saveDraftBtn" class="btn outline" style="padding:14px 18px">Bewaar als concept</button>
      </div>
      <div id="draftSavedMsg" style="margin-top:10px;color:var(--sage);font-size:.85rem;display:none">Concept bewaard op dit toestel. Kom later terug op deze link om verder te werken.</div>
    </form>`;

  const storyText = document.getElementById('storyText');

  function updateCharCount() {
    const len = storyText.innerText.trim().length;
    document.getElementById('charCount').textContent = `${len} / 2000 tekens`;
    document.getElementById('charCount').style.color = len > 2000 ? '#8A4222' : '';
  }

  storyText.addEventListener('input', updateCharCount);
  updateCharCount();

  document.getElementById('saveDraftBtn').addEventListener('click', () => {
    saveDraft('story', storyText.innerHTML);
    const msg = document.getElementById('draftSavedMsg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  });

  document.getElementById('toggleHints').addEventListener('click', () => {
    const box = document.getElementById('hintChips');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
  });

  document.querySelectorAll('.hint-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const strong = document.createElement('strong');
      strong.textContent = chip.textContent;
      storyText.appendChild(strong);
      storyText.appendChild(document.createElement('br'));
      storyText.appendChild(document.createElement('br'));
      updateCharCount();
      storyText.focus();
      const range = document.createRange();
      range.selectNodeContents(storyText);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
  });

  document.getElementById('storyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const duration = document.getElementById('duration').value;
    const rawContent = storyText.innerText.trim();
    const errorBox = document.getElementById('error');
    if (!rawContent) {
      errorBox.textContent = 'Schrijf eerst je verhaal voor je het verstuurt.';
      errorBox.style.display = 'block';
      return;
    }
    if (rawContent.length > 2000) {
      errorBox.textContent = 'Je verhaal is te lang (max 2.000 tekens in deze gratis versie).';
      errorBox.style.display = 'block';
      return;
    }
    const content = `Dit speelt al: ${duration}.\n\n${rawContent}`;
    const isAnonymous = document.getElementById('anon').checked;
    try {
      const res = await fetch('/.netlify/functions/submit-story', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, content, isAnonymous }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      clearDraft('story');
      load();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    }
  });
}

function renderFollowupForm(questions, name) {
  const draftRaw = loadDraft('followup');
  let draftAnswers = {};
  try { draftAnswers = draftRaw ? JSON.parse(draftRaw) : {}; } catch (e) {}

  app.innerHTML = `
    <span class="label">Nog wat dieper</span>
    <h1>Een paar vervolgvragen</h1>
    <div class="status-box" style="background:var(--clay-soft);border:none;text-align:left;margin-bottom:20px;color:var(--ink)">
      Je vult dit in als <strong>${name}</strong>.
    </div>
    ${draftRaw ? '<div class="draft-notice">We hebben een eerder bewaard concept teruggevonden en alvast ingevuld.</div>' : ''}
    <p style="color:var(--ink-soft)">Op basis van beide verhalen willen we nog wat dingen beter begrijpen.</p>
    <div id="error" class="error-box" style="display:none"></div>
    <form id="followupForm">
      ${questions.map((q, i) => `
        <div class="field">
          <label>${q}</label>
          <textarea data-q="${i}" required>${draftAnswers[i] || ''}</textarea>
        </div>`).join('')}
      <div class="checkbox-row">
        <input type="checkbox" id="anon2">
        <label for="anon2">Vermeld mijn naam niet bij deze antwoorden (anoniem)</label>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button type="submit" class="btn clay" style="flex:1;padding:14px">Antwoorden versturen</button>
        <button type="button" id="saveDraftBtn2" class="btn outline" style="padding:14px 18px">Bewaar als concept</button>
      </div>
      <div id="draftSavedMsg2" style="margin-top:10px;color:var(--sage);font-size:.85rem;display:none">Concept bewaard op dit toestel.</div>
    </form>`;

  function collectDraftAnswers() {
    const obj = {};
    document.querySelectorAll('[data-q]').forEach(t => { obj[t.dataset.q] = t.value; });
    return obj;
  }

  document.getElementById('saveDraftBtn2').addEventListener('click', () => {
    saveDraft('followup', JSON.stringify(collectDraftAnswers()));
    const msg = document.getElementById('draftSavedMsg2');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  });

  document.getElementById('followupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const answers = Array.from(document.querySelectorAll('[data-q]'))
      .map(t => `Vraag: ${questions[t.dataset.q]}\nAntwoord: ${t.value.trim()}`)
      .join('\n\n');
    const isAnonymous = document.getElementById('anon2').checked;
    const errorBox = document.getElementById('error');
    try {
      const res = await fetch('/.netlify/functions/submit-followups', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, content: answers, isAnonymous }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      clearDraft('followup');
      load();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    }
  });
}

function renderCheckinForm(round, name) {
  const draftSuffix = `checkin_${round}`;
  const existingDraft = loadDraft(draftSuffix);
  app.innerHTML = `
    <span class="label">Check-in</span>
    <h1>Hoe staat het er nu voor?</h1>
    <div class="status-box" style="background:var(--clay-soft);border:none;text-align:left;margin-bottom:20px;color:var(--ink)">
      Je vult dit in als <strong>${name}</strong>.
    </div>
    ${existingDraft ? '<div class="draft-notice">We hebben een eerder bewaard concept teruggevonden en alvast ingevuld.</div>' : ''}
    <p style="color:var(--ink-soft)">Vul aan wat er veranderd of bijgekomen is sinds de vorige keer.</p>
    <div id="error" class="error-box" style="display:none"></div>
    <form id="checkinForm">
      <div class="field">
        <textarea id="checkinText" required placeholder="Wat is er veranderd sinds de vorige keer?">${existingDraft}</textarea>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="anon3">
        <label for="anon3">Vermeld mijn naam niet bij deze aanvulling (anoniem)</label>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button type="submit" class="btn clay" style="flex:1;padding:14px">Aanvulling versturen</button>
        <button type="button" id="saveDraftBtn3" class="btn outline" style="padding:14px 18px">Bewaar als concept</button>
      </div>
      <div id="draftSavedMsg3" style="margin-top:10px;color:var(--sage);font-size:.85rem;display:none">Concept bewaard op dit toestel.</div>
    </form>`;

  document.getElementById('saveDraftBtn3').addEventListener('click', () => {
    saveDraft(draftSuffix, document.getElementById('checkinText').value);
    const msg = document.getElementById('draftSavedMsg3');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  });

  document.getElementById('checkinForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const content = document.getElementById('checkinText').value.trim();
    const isAnonymous = document.getElementById('anon3').checked;
    const errorBox = document.getElementById('error');
    try {
      const res = await fetch('/.netlify/functions/submit-checkin', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, content, isAnonymous }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      clearDraft(draftSuffix);
      load();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    }
  });
}

load();
</script>
</body>
</html>
