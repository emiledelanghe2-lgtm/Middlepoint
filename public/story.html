function docLinkWithReturn(tok) {
  return `/document.html?token=${tok}${returnToken ? '&from=' + encodeURIComponent(returnToken) : ''}`;
}

async function goToMijnGesprekken() {
  if (returnToken) {
    window.location.href = `/mijn-gesprekken.html?token=${encodeURIComponent(returnToken)}`;
    return;
  }
  try {
    const res = await fetch(`/.netlify/functions/get-my-sessions-link?token=${token}`);
    const data = await res.json();
    if (res.ok && data.link) {
      window.location.href = data.link;
    } else {
      window.location.href = '/login.html';
    }
  } catch (e) {
    window.location.href = '/login.html';
  }
}

function draftKey(suffix) { return `mp_draft_${suffix}_${token}`; }
function saveDraft(suffix, value) { try { localStorage.setItem(draftKey(suffix), value); } catch (e) {} }
function loadDraft(suffix) { try { return localStorage.getItem(draftKey(suffix)) || ''; } catch (e) { return ''; } }
function clearDraft(suffix) { try { localStorage.removeItem(draftKey(suffix)); } catch (e) {} }

function esc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderInput(q) {
  if (q.type === 'single') {
    let opts = q.options.map(o => `
      <label class="mc-option">
        <input type="radio" name="${esc(q.id)}" value="${esc(o.value)}">
        <span>${esc(o.label)}</span>
      </label>`).join('');
    if (q.allowOther) {
      opts += `
        <label class="mc-option">
          <input type="radio" name="${esc(q.id)}" value="__andere__" class="other-toggle-radio" data-other-target="other_${esc(q.id)}">
          <span>Geen van deze, ik leg het zelf uit</span>
        </label>
        <input type="text" id="other_${esc(q.id)}" class="other-input" style="display:none" placeholder="Vul hier aan">`;
    }
    return `<div class="mc-group" data-name="${esc(q.id)}">${opts}</div>`;
  }
  if (q.type === 'multi') {
    let opts = q.options.map(o => `
      <label class="mc-option">
        <input type="checkbox" name="${esc(q.id)}" value="${esc(o.value)}">
        <span>${esc(o.label)}</span>
      </label>`).join('');
    if (q.allowOther) {
      opts += `
        <label class="mc-option">
          <input type="checkbox" name="${esc(q.id)}" value="__andere__" class="other-toggle" data-other-target="other_${esc(q.id)}">
          <span>Geen van deze, ik leg het zelf uit</span>
        </label>
        <input type="text" id="other_${esc(q.id)}" class="other-input" style="display:none" placeholder="Vul hier aan">`;
    }
    return `<div class="mc-group" data-name="${esc(q.id)}">${opts}</div>`;
  }
  if (q.type === 'scale') {
    const opts = [1,2,3,4,5].map(n => `
      <label class="scale-option">
        <input type="radio" name="${esc(q.id)}" value="${n}">
        <span>${n}</span>
      </label>`).join('');
    return `<div class="scale-group" data-name="${esc(q.id)}" data-low="${escAttr(q.lowLabel || '')}" data-high="${escAttr(q.highLabel || '')}">
      <div class="scale-row">${opts}</div>
      <div class="scale-labels"><span>${esc(q.lowLabel || '')}</span><span>${esc(q.highLabel || '')}</span></div>
    </div>`;
  }
  if (q.type === 'yesno') {
    let branchHtml = '';
    if (q.branch) {
      if (q.branch.ja) branchHtml += `<div class="branch-box" id="branch_${esc(q.id)}_ja" style="display:none">${renderQuestion(q.branch.ja)}</div>`;
      if (q.branch.nee) branchHtml += `<div class="branch-box" id="branch_${esc(q.id)}_nee" style="display:none">${renderQuestion(q.branch.nee)}</div>`;
    }
    return `<div class="mc-group" data-name="${esc(q.id)}">
      <label class="mc-option"><input type="radio" name="${esc(q.id)}" value="ja" class="yesno-input" data-parent="${esc(q.id)}"><span>Ja</span></label>
      <label class="mc-option"><input type="radio" name="${esc(q.id)}" value="nee" class="yesno-input" data-parent="${esc(q.id)}"><span>Nee</span></label>
    </div>${branchHtml}`;
  }
  if (q.type === 'text') {
    const maxChars = q.isFinal
      ? (currentPlan === 'gratis' ? 1000 : 12000)
      : (currentPlan === 'gratis' ? 800 : 8000);
    const noteHtml = q.note ? `<div class="q-note">${esc(q.note)}</div>` : '';
    return `<textarea class="q-textarea" data-qid="${esc(q.id)}" maxlength="${maxChars}" placeholder="${escAttr(q.placeholder || '')}"></textarea>
      <div class="help char-counter" data-for="${esc(q.id)}">0 / ${maxChars.toLocaleString('nl-BE')} tekens</div>
      ${noteHtml}`;
  }
  return '';
}

function renderQuestion(q) {
  return `<div class="q-block" data-qid="${esc(q.id)}" data-required="${q.optional ? 'false' : 'true'}">
    <label class="q-label">${esc(q.label)}${q.optional ? '' : ' <span style="color:var(--clay)">*</span>'}</label>
    ${renderInput(q)}
  </div>`;
}

function handleSurveyChange(e) {
  const t = e.target;
  if (t.type === 'radio') {
    const group = t.closest('.mc-group');
    if (group) {
      const otherInput = group.querySelector('.other-input');
      if (otherInput) {
        otherInput.style.display = (t.classList.contains('other-toggle-radio') && t.checked) ? 'block' : 'none';
      }
    }
  }
  if (t.classList && t.classList.contains('other-toggle')) {
    const target = document.getElementById(t.dataset.otherTarget);
    if (target) target.style.display = t.checked ? 'block' : 'none';
  }
  if (t.classList && t.classList.contains('yesno-input')) {
    const parent = t.dataset.parent;
    const jaBox = document.getElementById(`branch_${parent}_ja`);
    const neeBox = document.getElementById(`branch_${parent}_nee`);
    if (jaBox) jaBox.style.display = (t.value === 'ja') ? 'block' : 'none';
    if (neeBox) neeBox.style.display = (t.value === 'nee') ? 'block' : 'none';
  }
}

function handleSurveyInput(e) {
  const t = e.target;
  if (t.classList && t.classList.contains('q-textarea')) {
    const container = e.currentTarget;
    const counter = container.querySelector(`.char-counter[data-for="${t.dataset.qid}"]`);
    if (counter) {
      const max = t.getAttribute('maxlength');
      counter.textContent = `${t.value.length} / ${Number(max).toLocaleString('nl-BE')} tekens`;
    }
  }
  if (t.classList && t.classList.contains('other-input') && t.id) {
    const toggle = document.querySelector(`[data-other-target="${t.id}"]`);
    if (toggle && !toggle.checked && t.value.trim()) {
      toggle.checked = true;
      toggle.dispatchEvent(new Event('change', { bubbles: true }));
    }
  }
}

function cssAttrEscape(v) {
  return String(v).replace(/["\\]/g, '\\$&');
}

function collectAnswers(container) {
  const blocks = Array.from(container.querySelectorAll('.q-block[data-qid]'));
  const results = [];
  for (const block of blocks) {
    if (block.offsetParent === null) continue;
    const qid = block.dataset.qid;
    const required = block.dataset.required === 'true';
    const label = block.querySelector('.q-label').textContent;
    let answer = '';
    const group = block.querySelector(`.mc-group[data-name="${cssAttrEscape(qid)}"]`);
    const scaleGroup = block.querySelector(`.scale-group[data-name="${cssAttrEscape(qid)}"]`);
    const textarea = block.querySelector(`textarea.q-textarea[data-qid="${cssAttrEscape(qid)}"]`);
    if (group) {
      const checked = Array.from(group.querySelectorAll('input:checked'));
      const isMulti = group.querySelectorAll('input[type=checkbox]').length > 0;
      if (isMulti) {
        const labels = checked.filter(c => c.value !== '__andere__').map(c => c.closest('label').querySelector('span').textContent);
        const otherChecked = checked.find(c => c.value === '__andere__');
        if (otherChecked) {
          const otherInput = document.getElementById(`other_${qid}`);
          if (otherInput && otherInput.value.trim()) labels.push(otherInput.value.trim());
        }
        answer = labels.join(', ');
      } else if (checked.length) {
        if (checked[0].value === '__andere__') {
          const otherInput = document.getElementById(`other_${qid}`);
          answer = otherInput ? otherInput.value.trim() : '';
        } else {
          answer = checked[0].closest('label').querySelector('span').textContent;
        }
      }
    } else if (scaleGroup) {
      const checked = scaleGroup.querySelector('input:checked');
      if (checked) {
        const val = parseInt(checked.value, 10);
        const low = scaleGroup.dataset.low || 'lichter';
        const high = scaleGroup.dataset.high || 'zwaarder';
        if (val <= 2) answer = `Dichter bij: ${low}`;
        else if (val >= 4) answer = `Dichter bij: ${high}`;
        else answer = 'Ergens in het midden';
      }
    } else if (textarea) {
      answer = textarea.value.trim();
    }
    results.push({ qid, label, answer, required });
  }
  return results;
}

function validateAndBuildContent(container) {
  const answers = collectAnswers(container);
  const missing = answers.find(a => a.required && !a.answer);
  if (missing) {
    const block = container.querySelector(`.q-block[data-qid="${cssAttrEscape(missing.qid)}"]`);
    if (block) {
      block.scrollIntoView({ behavior: 'smooth', block: 'center' });
      block.classList.add('q-invalid');
      setTimeout(() => block.classList.remove('q-invalid'), 2500);
    }
    return null;
  }
  const lines = answers.filter(a => a.answer).map(a => {
    if (a.qid === 'vertrouwelijke_context') {
      return `Vraag: [VERTROUWELIJK, NOOIT TONEN AAN DE ANDER] ${a.label}\nAntwoord: ${a.answer}`;
    }
    return `Vraag: ${a.label}\nAntwoord: ${a.answer}`;
  });
  return lines.join('\n\n');
}

function serializeFormState(container) {
  const state = { radios: {}, checkboxes: {}, textareas: {}, others: {} };
  container.querySelectorAll('input[type=radio]:checked').forEach(r => { state.radios[r.name] = r.value; });
  container.querySelectorAll('input[type=checkbox]:checked').forEach(c => {
    state.checkboxes[c.name] = state.checkboxes[c.name] || [];
    state.checkboxes[c.name].push(c.value);
  });
  container.querySelectorAll('textarea.q-textarea').forEach(t => { state.textareas[t.dataset.qid] = t.value; });
  container.querySelectorAll('.other-input').forEach(o => { state.others[o.id] = o.value; });
  return state;
}

function restoreFormState(state, container) {
  if (!state) return;
  Object.entries(state.radios || {}).forEach(([name, val]) => {
    const el = container.querySelector(`input[type=radio][name="${cssAttrEscape(name)}"][value="${cssAttrEscape(val)}"]`);
    if (el) { el.checked = true; el.dispatchEvent(new Event('change', { bubbles: true })); }
  });
  Object.entries(state.checkboxes || {}).forEach(([name, vals]) => {
    vals.forEach(val => {
      const el = container.querySelector(`input[type=checkbox][name="${cssAttrEscape(name)}"][value="${cssAttrEscape(val)}"]`);
      if (el) { el.checked = true; el.dispatchEvent(new Event('change', { bubbles: true })); }
    });
  });
  Object.entries(state.textareas || {}).forEach(([qid, val]) => {
    const el = container.querySelector(`textarea.q-textarea[data-qid="${cssAttrEscape(qid)}"]`);
    if (el) { el.value = val; el.dispatchEvent(new Event('input', { bubbles: true })); }
  });
  Object.entries(state.others || {}).forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (el) el.value = val;
  });
}

async function load() {
  if (!token) { app.innerHTML = '<div class="error-box">Geen geldige link. Vraag de organisator om de link opnieuw te sturen, of <a href="/login.html">bekijk je gesprekken via Mijn gesprekken</a>.</div>'; return; }
  const res = await fetch(`/.netlify/functions/get-session?token=${token}`);
  const data = await res.json();
  if (!res.ok) { app.innerHTML = `<div class="error-box">${data.error}</div>`; return; }
  render(data);
}

function otherNames(data) {
  return (data.allParticipants || [])
    .filter(p => !p.is_organizer && p.id !== data.participant.id)
    .map(p => p.display_name)
    .join(' en ');
}

function organizerName(data) {
  const organizer = (data.allParticipants || []).find(p => p.is_organizer);
  return organizer ? organizer.display_name : null;
}

function whoStartedBanner(data) {
  if (data.participant.isOrganizer) return '';
  const orgName = organizerName(data);
  if (!orgName) return '';
  return `<div class="who-started">Dit gesprek is gestart door <strong>${orgName}</strong>.</div>`;
}

function attachLinksButton(tok) {
  const btn = document.getElementById('showLinksBtn');
  if (!btn) return;
  btn.addEventListener('click', async () => {
    const box = document.getElementById('linksBox');
    box.innerHTML = '<p style="color:var(--ink-soft);font-size:.85rem">Even laden...</p>';
    try {
      const res = await fetch(`/.netlify/functions/get-session-links?token=${tok}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
     box.innerHTML = data.links.map((l, i) => `

            const old = btn.textContent;
            btn.textContent = '✓';

          });
        });
      });
    } catch (err) {
      box.innerHTML = `<p style="color:#8A4222;font-size:.85rem">${err.message}</p>`;
    }

function attachCategoryEditor(session, onCategoryChanged) {
  const select = document.getElementById('categoryEdit');
  if (!select) return;
  const otherField = document.getElementById('categoryEditOtherField');
  const otherInput = document.getElementById('categoryEditOther');
  const savedMsg = document.getElementById('categorySavedMsg');

  async function saveCategory() {
    let value = select.value;
    if (value === '__andere__') {
      value = otherInput.value.trim();
      if (!value) return;
    }
    if (value === session.category) return;
    try {
      const res = await fetch('/.netlify/functions/update-session-category', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, category: value }),
      });
      if (res.ok) {
        session.category = value;
        savedMsg.style.display = 'block';
        setTimeout(() => { savedMsg.style.display = 'none'; onCategoryChanged(); }, 1200);
      }
    } catch (e) { /* stil falen, niet kritiek */ }
  }

  select.addEventListener('change', () => {
    otherField.style.display = select.value === '__andere__' ? 'block' : 'none';
    if (select.value !== '__andere__') saveCategory();
  });
  otherInput.addEventListener('blur', saveCategory);
}

  } else if ((session.status || '').startsWith('nieuwe_ronde_')) {

    }
  } else {

}

function statusLabel(status) {
  const labels = {
    wachten_op_verhalen: 'wachten op de antwoorden',
    verhalen_klaar_vervolgvragen_genereren: 'wordt voorbereid',
    wachten_op_vervolgvragen: 'wachten op de vervolgvragen',
    document_genereren: 'document wordt opgesteld',
    klaar: 'klaar',
    veiligheid_gestopt: 'gestopt om veiligheidsredenen',
  };
  if (labels[status]) return labels[status];
  if ((status || '').startsWith('nieuwe_ronde_')) return 'opvolging bezig';
  return status;
}

function parseAnswerBlocks(content) {
  return content.split('\n\n').map(block => {
    const lines = block.split('\n');
    const qLine = lines.find(l => l.startsWith('Vraag:')) || '';
    const aLine = lines.find(l => l.startsWith('Antwoord:')) || '';
    let question = qLine.replace('Vraag:', '').trim();
    const answer = aLine.replace('Antwoord:', '').trim();
    let confidential = false;
    if (question.includes('[VERTROUWELIJK, NOOIT TONEN AAN DE ANDER]')) {
      confidential = true;
      question = question.replace('[VERTROUWELIJK, NOOIT TONEN AAN DE ANDER]', '').trim();
    }
    return { question, answer, confidential };
  }).filter(b => b.question || b.answer);
}

      ${!noItemsFound ? `
      <div class="form-section" style="background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:20px">
        <span class="form-section-title" style="font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--clay);margin-bottom:16px;display:block">Terugblik op jullie document</span>
        ${renderFollowupChecklist(myTips, 'tips', 'Welke tips heb je gebruikt of besproken? (meerdere mogelijk)', 'Hoe ging dat? (optioneel)')}
        ${renderFollowupChecklist(myQuestions, 'vragen', 'Welke vragen heb je gesteld? (meerdere mogelijk)', 'Wat kwam daaruit? (optioneel)')}
        ${renderFollowupChecklist(myPhrases, 'zinnen', 'Welke zinnen heb je gebruikt? (meerdere mogelijk)', 'Hoe reageerde de ander? (optioneel)')}
      </div>` : `
      <div class="card" style="background:#EFF4ED;border:none;margin-bottom:20px;padding:16px">
        <p style="margin:0;font-size:.9rem">We konden geen specifieke tips of vragen uit jullie vorige document koppelen aan jouw naam. Geen probleem, vul hieronder gerust aan wat voor jou relevant is.</p>
      </div>`}

      <div class="q-block">
        <label class="q-label">Is er iets nieuws bijgekomen sinds de vorige keer? (optioneel)</label>
        <textarea class="q-textarea" id="nieuwePunten" maxlength="3000" placeholder="Beschrijf gerust als er een nieuw punt is opgedoken."></textarea>
      </div>

      <div class="q-block">
        <label class="q-label">Wat is er positief veranderd dat je tegen de ander wil zeggen? (optioneel)</label>
        <textarea class="q-textarea" id="positiefVeranderd" maxlength="3000" placeholder="Wat ging goed sinds de vorige keer?"></textarea>
      </div>

      <div class="q-block">
        <label class="q-label">Waar ligt voor jou nog het meeste werk? (optioneel)</label>
        <textarea class="q-textarea" id="nogWerk" maxlength="3000" placeholder="Wat vraagt nog aandacht?"></textarea>
      </div>

      <div class="q-block">
        <label class="q-label">Wil je zelf een nieuwe tip of openingszin voorstellen? (optioneel)</label>
        <textarea class="q-textarea" id="eigenTipOpvolging" maxlength="2000" placeholder="bv. Het zou fijn zijn als..."></textarea>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="anonFollowup">
        <label for="anonFollowup">Vermeld mijn naam niet bij deze aanvulling (anoniem)</label>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button type="button" id="saveDraftFollowupBtn" class="btn outline" style="flex:1;padding:14px">Bewaar als concept</button>
        <button type="button" id="submitFollowupBtn" class="btn clay" style="flex:1;padding:14px">Definitief indienen</button>
      </div>
      <div id="draftSavedFollowupMsg" style="margin-top:10px;color:var(--sage);font-size:.85rem;display:none">Concept bewaard op dit toestel.</div>
    </form>

    <div id="confirmFollowupModal" style="display:none;position:fixed;inset:0;background:rgba(43,38,32,.45);z-index:100;align-items:center;justify-content:center;padding:20px">
      <div style="background:var(--white);border-radius:var(--radius);padding:28px;max-width:420px;width:100%">
        <h3 style="margin-bottom:12px">Definitief indienen?</h3>
        <p style="color:var(--ink-soft);font-size:.92rem;margin-bottom:20px">Na het indienen kan je deze opvolging niet meer aanpassen.</p>
        <div style="display:flex;gap:10px">
          <button type="button" id="cancelFollowupSubmit" class="btn outline" style="flex:1">Nog even wachten</button>
          <button type="button" id="confirmFollowupSubmit" class="btn clay" style="flex:1">Ja, indienen</button>
        </div>
      </div>
    </div>`;

  const structuredBody = document.getElementById('structuredFollowupBody');
  structuredBody.addEventListener('change', handleSurveyChange);

  const draftRaw = loadDraft(`checkin_survey_${round}`);
  if (draftRaw) {
    try {
      const draft = JSON.parse(draftRaw);
      if (draft.nieuwePunten) document.getElementById('nieuwePunten').value = draft.nieuwePunten;
      if (draft.positiefVeranderd) document.getElementById('positiefVeranderd').value = draft.positiefVeranderd;
      if (draft.nogWerk) document.getElementById('nogWerk').value = draft.nogWerk;
      if (draft.eigenTipOpvolging) document.getElementById('eigenTipOpvolging').value = draft.eigenTipOpvolging;
    } catch (e) {}
  }

  function collectFollowupContent() {
    const lines = [];

    const structuredAnswers = collectAnswers(structuredBody);
    structuredAnswers.filter(a => a.answer).forEach(a => {
      lines.push(`Vraag: ${a.label}\nAntwoord: ${a.answer}`);
    });

    document.querySelectorAll('[data-followup-group]').forEach(groupEl => {
      const groupId = groupEl.dataset.followupGroup;
      const checked = Array.from(groupEl.querySelectorAll('.followup-check:checked')).map(c => c.value);
      const note = groupEl.querySelector('.followup-note').value.trim();
      if (checked.length || note) {
        let line = `Vraag: Reactie op onderdeel "${groupId}"\nAntwoord: ${checked.length ? 'Gebruikt of besproken: ' + checked.join(' | ') : 'Niets specifiek aangevinkt'}`;
        if (note) line += `. Toelichting: ${note}`;
        lines.push(line);
      }
    });
    const nieuwePunten = document.getElementById('nieuwePunten').value.trim();
    if (nieuwePunten) lines.push(`Vraag: Is er iets nieuws bijgekomen sinds de vorige keer?\nAntwoord: ${nieuwePunten}`);
    const positief = document.getElementById('positiefVeranderd').value.trim();
    if (positief) lines.push(`Vraag: Wat is er positief veranderd dat je wil zeggen?\nAntwoord: ${positief}`);
    const nogWerk = document.getElementById('nogWerk').value.trim();
    if (nogWerk) lines.push(`Vraag: Waar ligt nog het meeste werk?\nAntwoord: ${nogWerk}`);
    const eigenTip = document.getElementById('eigenTipOpvolging').value.trim();
    if (eigenTip) lines.push(`Vraag: Zelf voorgestelde tip of openingszin voor de opvolging\nAntwoord: ${eigenTip}`);
    return lines.join('\n\n');
  }

  document.getElementById('saveDraftFollowupBtn').addEventListener('click', () => {
    saveDraft(`checkin_survey_${round}`, JSON.stringify({
      nieuwePunten: document.getElementById('nieuwePunten').value,
      positiefVeranderd: document.getElementById('positiefVeranderd').value,
      nogWerk: document.getElementById('nogWerk').value,
      eigenTipOpvolging: document.getElementById('eigenTipOpvolging').value,
    }));
    const msg = document.getElementById('draftSavedFollowupMsg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  });

  document.getElementById('submitFollowupBtn').addEventListener('click', () => {
    const content = collectFollowupContent();
    const errorBox = document.getElementById('error');
    errorBox.style.display = 'none';
    if (!content) {
      errorBox.textContent = 'Vul minstens iets in voor je indient, alles hoeft niet, maar helemaal leeg kan niet.';
      errorBox.style.display = 'block';
      return;
    }
    pendingSubmitContent = content;
    document.getElementById('confirmFollowupModal').style.display = 'flex';
  });

  document.getElementById('cancelFollowupSubmit').addEventListener('click', () => {
    document.getElementById('confirmFollowupModal').style.display = 'none';
  });

  document.getElementById('confirmFollowupSubmit').addEventListener('click', async () => {
    const isAnonymous = document.getElementById('anonFollowup').checked;
    const errorBox = document.getElementById('error');
    document.getElementById('confirmFollowupModal').style.display = 'none';
    try {
      const res = await fetch('/.netlify/functions/submit-checkin', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, content: pendingSubmitContent, isAnonymous }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      clearDraft(`checkin_survey_${round}`);
      load();
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    }
  });
}

load();
</script>
</body>
</html>
